<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" role="img" aria-label="Animated demo preview for reconstruction">
  <rect width="960" height="240" rx="28" fill="#020617"/>
  <text x="40" y="52" fill="#f8fafc" font-family="Inter,Arial" font-size="28" font-weight="800">3D reconstruction demo loop</text>
  <text x="40" y="82" fill="#94a3b8" font-family="Inter,Arial" font-size="15">frames ’ calibration ’ SLAM poses ’ COLMAP summary</text>
  <path d="M92 164 C230 70, 360 210, 500 126 S720 82, 850 158" fill="none" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>
  <g fill="#f59e0b">
    <circle cx="92" cy="164" r="10"/><circle cx="300" cy="150" r="10"/><circle cx="500" cy="126" r="10"/><circle cx="700" cy="94" r="10"/><circle cx="850" cy="158" r="10"/>
  </g>
  <circle cx="92" cy="164" r="16" fill="none" stroke="#34d399" stroke-width="4">
    <animate attributeName="cx" values="92;300;500;700;850;92" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="164;150;126;94;158;164" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
